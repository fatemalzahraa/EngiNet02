<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EngiNet – Reset Password</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1f2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #242938;
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 8px;
      font-size: 28px;
      font-weight: bold;
      color: #f0c040;
      letter-spacing: 1px;
    }
    .subtitle {
      text-align: center;
      color: #8899aa;
      font-size: 14px;
      margin-bottom: 32px;
    }
    input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid #333a4f;
      background: #1a1f2e;
      color: #fff;
      font-size: 15px;
      margin-bottom: 14px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #f0c040; }
    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #f0c040;
      color: #1a1f2e;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg {
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
      padding: 10px;
      border-radius: 8px;
    }
    .msg.error { background: #3a1a1a; color: #ff6b6b; }
    .msg.success { background: #1a3a1a; color: #6bff6b; }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">EngiNet</div>
  <div class="subtitle">Set your new password</div>

  <div id="formSection">
    <input type="password" id="newPass" placeholder="New password" />
    <input type="password" id="confirmPass" placeholder="Confirm password" />
    <button id="btn" onclick="resetPassword()">Update Password</button>
    <div id="msg" class="msg hidden"></div>
  </div>

  <div id="successSection" class="hidden" style="text-align:center;">
    <div style="font-size:48px; margin-bottom:16px;">✅</div>
    <p style="color:#6bff6b; font-size:16px; font-weight:bold;">Password updated!</p>
    <p style="color:#8899aa; font-size:13px; margin-top:8px;">You can now log in with your new password.</p>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://ksfrsnbfdzgtkxhswobs.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtzZnJzbmJmZHpndGt4aHN3b2JzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5Nzk3ODgsImV4cCI6MjA5MDU1NTc4OH0.igEzAcb8dF1G25IpzCrMNg8q_K6hdoj9mHPZMVeA7Bs';

  const { createClient } = supabase;
  const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let sessionReady = false;

  async function init() {
  // Önce onAuthStateChange dinle
  client.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      sessionReady = true;
      showMsg('Ready! Enter your new password.', 'success');
    }
  });

  // Sonra hash'ten session set et
  const hash = window.location.hash;
  if (hash) {
    const params = new URLSearchParams(hash.substring(1));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token') || '';
    const type = params.get('type');
    if (accessToken && type === 'recovery') {
      const { error } = await client.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken,
      });
      if (error) {
        showMsg('Link expired. Please request a new reset email.', 'error');
      }
    } else if (!accessToken) {
      showMsg('Invalid reset link.', 'error');
    }
  } else {
    showMsg('Invalid reset link. Please request a new one.', 'error');
  }
}
  init();

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
    el.classList.remove('hidden');
  }

  async function resetPassword() {
    if (!sessionReady) {
      showMsg('Session not ready. Please use the link from your email.', 'error');
      return;
    }

    const newPass = document.getElementById('newPass').value;
    const confirmPass = document.getElementById('confirmPass').value;
    const btn = document.getElementById('btn');

    if (!newPass || !confirmPass) {
      showMsg('Please fill all fields', 'error');
      return;
    }
    if (newPass !== confirmPass) {
      showMsg('Passwords do not match', 'error');
      return;
    }
    if (newPass.length < 6) {
      showMsg('Password must be at least 6 characters', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Updating...';

    const { error } = await client.auth.updateUser({ password: newPass });

    if (error) {
      showMsg(error.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Update Password';
    } else {
      document.getElementById('formSection').classList.add('hidden');
      document.getElementById('successSection').classList.remove('hidden');
    }
  }
</script>
</body>
</html>
